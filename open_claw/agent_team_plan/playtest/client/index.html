<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Elemental Hunter Playtest</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --primary: #6366f1; --success: #22c55e; --warn: #f59e0b;
    --danger: #ef4444; --text: #f1f5f9; --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 16px; }
  #status { font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
  .dot.connected { background: var(--success); }
  main { flex: 1; display: grid; grid-template-columns: 1fr 320px; overflow: hidden; }
  #board-container { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); padding: 10px; gap: 8px; }
  canvas { border: 1px solid var(--border); border-radius: 4px; }
  #right-panel { display: flex; flex-direction: column; overflow: hidden; }
  #info-panel { background: var(--surface); padding: 12px; overflow-y: auto; flex: 1; border-bottom: 1px solid var(--border); }
  #log-panel { background: var(--bg); padding: 12px; overflow-y: auto; height: 200px; }
  .player-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 12px; }
  .player-card.active { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
  .player-card h3 { font-size: 13px; margin-bottom: 4px; }
  .player-card .row { display: flex; justify-content: space-between; margin-top: 3px; color: var(--muted); }
  .player-card .row span:last-child { color: var(--text); }
  #controls { padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { background: var(--primary); color: white; border: none; border-radius: 4px; padding: 6px 12px; font-family: monospace; font-size: 12px; cursor: pointer; transition: opacity 0.2s; }
  button:hover:not(:disabled) { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.secondary { background: var(--surface); border: 1px solid var(--border); }
  #roll-display { color: var(--warn); font-size: 13px; font-weight: bold; }
  .log-entry { font-size: 11px; color: var(--muted); margin-bottom: 2px; line-height: 1.4; }
  .log-entry .time { color: var(--primary); margin-right: 6px; }
  .log-entry.event { color: var(--text); }
  .log-entry.error { color: var(--danger); }
  .log-entry.win { color: var(--warn); font-weight: bold; font-size: 13px; }
  #connect-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  #connect-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px; width: 340px; }
  #connect-box h2 { margin-bottom: 6px; font-size: 18px; }
  #connect-box p { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  #connect-box label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  #connect-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 4px; font-family: monospace; font-size: 14px; margin-bottom: 14px; }
  #connect-box input:focus { outline: none; border-color: var(--primary); }
  #connect-box button { width: 100%; padding: 10px; font-size: 14px; }
  #turn-indicator { font-size: 12px; color: var(--warn); padding: 4px 0; margin-bottom: 4px; }
</style>
</head>
<body>

<div id="connect-overlay">
  <div id="connect-box">
    <h2>🎮 Elemental Hunter</h2>
    <p>Standalone playtest server — connect 2 tabs to play</p>
    <label>Room ID</label>
    <input id="inp-room" type="text" value="room1" placeholder="room1">
    <label>Player ID</label>
    <input id="inp-player" type="text" value="p1" placeholder="p1 or p2">
    <button onclick="connect()">⚡ Connect</button>
  </div>
</div>

<header>
  <h1>🎮 Elemental Hunter Playtest</h1>
  <div id="status"><div class="dot" id="dot"></div><span id="status-text">Disconnected</span></div>
</header>

<main>
  <div id="board-container">
    <canvas id="board" width="520" height="480"></canvas>
    <div style="font-size:11px;color:var(--muted)">🟥 P1 tokens &nbsp; 🟦 P2 tokens &nbsp; ★ Safe &nbsp; ⚡ Elemental &nbsp; 🏁 Final Goal</div>
  </div>
  <div id="right-panel">
    <div id="info-panel">
      <div id="turn-indicator">Waiting for players...</div>
      <div id="players-area"><div style="color:var(--muted);font-size:12px">No players yet</div></div>
    </div>
    <div id="controls" style="display:none">
      <button id="btn-roll" onclick="sendRoll()" disabled>🎲 Roll</button>
      <button id="btn-tokenA" onclick="sendSelect('tokenA')" disabled>Token A</button>
      <button id="btn-tokenB" onclick="sendSelect('tokenB')" disabled>Token B</button>
      <button id="btn-move" onclick="sendMove()" disabled>▶ Move</button>
      <span id="roll-display"></span>
    </div>
    <div id="log-panel"><div id="log"></div></div>
  </div>
</main>

<!--
  LOAD ORDER (critical — do not reorder):
  1. core/ws-client.js    — global state + WebSocket protocol   [PROTECTED]
  2. core/board-renderer.js — Canvas board rendering            [PROTECTED]
  3. core/game-ui.js      — players panel, controls, log        [PROTECTED]
  4. src/*.js             — agent-generated feature modules     [agent_dev_client]
-->

<!-- Core (protected — do not modify) -->
<script src="core/ws-client.js"></script>
<script src="core/board-renderer.js"></script>
<script src="core/game-ui.js"></script>

<!-- Agent-generated feature modules (src/*.js loaded in alpha order) -->

</body>
</html>
